name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Code Quality & Security
  quality:
    runs-on: ubuntu-latest
    name: Code Quality & Security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run security audit
        run: npm audit --production
        continue-on-error: true

      - name: Check for secrets
        run: |
          if grep -r "sk-" --include="*.js" --include="*.json" src/ | grep -v node_modules; then
            echo "❌ Potential secrets found in code"
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"

  # Testing
  test:
    runs-on: ubuntu-latest
    name: Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
        continue-on-error: true

  # Dry Run
  dry-run:
    runs-on: ubuntu-latest
    name: Dry Run

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run dry run
        env:
          NODE_ENV: test
          DRY_RUN: true
          DEBUG: true
          FOUNDRY_IQ_KEY: test-key
          FOUNDRY_IQ_ENDPOINT: https://test.example.com
        run: npm start
        continue-on-error: true

  # Build
  build:
    runs-on: ubuntu-latest
    name: Build
    needs: [quality, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Verify build artifacts
        run: |
          if [ ! -d "src" ]; then
            echo "❌ Build failed: src directory not found"
            exit 1
          fi
          echo "✅ Build successful"

  # Deploy (on main branch only)
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Deploy to production
        env:
          FOUNDRY_IQ_KEY: ${{ secrets.FOUNDRY_IQ_KEY }}
          FOUNDRY_IQ_ENDPOINT: ${{ secrets.FOUNDRY_IQ_ENDPOINT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          NODE_ENV: production
        run: npm start

  # Notify on failure
  notify-failure:
    runs-on: ubuntu-latest
    name: Notify Failure
    if: failure()
    needs: [quality, test, build, deploy]

    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ KZDI Talent OS CI/CD Failed
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            
            Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true

  # Notify on success
  notify-success:
    runs-on: ubuntu-latest
    name: Notify Success
    if: success()
    needs: build

    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ KZDI Talent OS CI/CD Passed
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
        continue-on-error: true

