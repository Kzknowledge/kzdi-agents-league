name: CI/CD & KZDI Talent OS Automation Pipeline

on:
  push:
    branches:
      - showcase/kzdi-talent-os
      - main
  pull_request:
    branches:
      - showcase/kzdi-talent-os

# Repository: https://github.com/Kzknowledge/kzdi-agents-league

env:
  NODE_VERSION: '18'
  NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
  NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

jobs:
  code-quality-and-security:
    name: Code Quality & Security
    runs-on: ubuntu-# First, navigate to home
cd ~

# Clone the repo
git clone https://github.com/Kzknowledge/kzdi-agents-league.git
cd kzdi-agents-league

# Verify you're in a git repo
git status  # Should show branch info, not error
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: TypeScript type check
        run: npm run type-check --if-present
        continue-on-error: true

  operational-testing-and-dry-run:
    name: Operational Testing & Dry Run
    runs-on: ubuntu-latest
    needs: code-quality-and-security
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test --if-present -- --coverage
        continue-on-error: true
        env:
          CI: true

      - name: Build Next.js app (dry run)
        run: npm run build --if-present
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Verify build output
        run: |
          if [ -d ".next" ]; then
            echo "✅ Build successful"
            ls -la .next/ | head -20
          else
            echo "⚠️ Build output not found"
          fi

  deploy-to-netlify:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    needs: [code-quality-and-security, operational-testing-and-dry-run]
    if: github.ref == 'refs/heads/showcase/kzdi-talent-os' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build --if-present
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Deploy to Netlify
        id: netlify-deploy
        run: |
          npm install -g netlify-cli
          DEPLOY_OUTPUT=$(netlify deploy --prod --dir=.next --message="KZDI Talent OS Showcase - Build #${{ github.run_number }}" 2>&1)
          echo "$DEPLOY_OUTPUT"
          NETLIFY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP '(?<=Live URL:).*' | head -1 | xargs)
          echo "netlify_url=$NETLIFY_URL" >> $GITHUB_OUTPUT
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Extract deployment info
        id: deployment-info
        run: |
          echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "commit_sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "actor=${{ github.actor }}" >> $GITHUB_OUTPUT

      - name: Stream deployment status to KZ Mentor Bot
        run: |
          TELEGRAM_MESSAGE="
          ✅ KZDI Talent OS CI/CD Passed
          
          Repository: github.com/Kzknowledge/kzdi-agents-league
          Branch: ${{ steps.deployment-info.outputs.branch }}
          Commit: ${{ steps.deployment-info.outputs.commit_sha_short }}
          
          🚀 Netlify URL: ${{ steps.netlify-deploy.outputs.netlify_url }}
          
          Status: Deployed
          Pipeline Duration: ${{ job.duration }}
          
          Pushed by: ${{ steps.deployment-info.outputs.actor }}
          "
          
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -H 'Content-Type: application/json' \
            -d '{
              "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}",
              "text": "'"${TELEGRAM_MESSAGE}"'",
              "parse_mode": "HTML"
            }' || echo "⚠️ Telegram notification skipped"

      - name: Post deployment link to GitHub
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const deploymentUrl = '${{ steps.netlify-deploy.outputs.netlify_url }}';
            if (deploymentUrl) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🚀 **KZDI Talent OS Deployed**\n\n[Live URL](${deploymentUrl})`
              });
            }

  cleanup-on-failure:
    name: Cleanup on Failure
    runs-on: ubuntu-latest
    if: failure()
    needs: [code-quality-and-security, operational-testing-and-dry-run, deploy-to-netlify]
    steps:
      - name: Alert failure to KZ Mentor Bot
        run: |
          TELEGRAM_MESSAGE="
          ❌ KZDI Talent OS CI/CD Failed
          
          Repository: github.com/Kzknowledge/kzdi-agents-league
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          
          Pipeline Job: ${{ github.job }}
          Run ID: ${{ github.run_id }}
          
          Check: https://github.com/Kzknowledge/kzdi-agents-league/actions/runs/${{ github.run_id }}
          "
          
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -H 'Content-Type: application/json' \
            -d '{
              "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}",
              "text": "'"${TELEGRAM_MESSAGE}"'",
              "parse_mode": "HTML"
            }' || true

